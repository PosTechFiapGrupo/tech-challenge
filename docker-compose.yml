services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
       - ${ENV_FILE:-.env}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - tech-network

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    env_file:
       - ${ENV_FILE:-.env}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      timeout: 20s
      retries: 10
      start_period: 40s
      interval: 10s
    networks:
      - tech-network

volumes:
  mysql_data:

networks:
  tech-network:
    driver: bridge
