name: CI/CD – Tech Challenge (Build → Test → Push → Deploy)

on:
  push:
    branches: [main]
  pull_request:
    branches: [fase1, fase2, fase3, fase4, fase5]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: tech-challenge-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_PORT: 8000
  MYSQL_HOST: mysql
  MYSQL_PORT: 3306
  MYSQL_DATABASE: tech_challenge
  MYSQL_USER: tech_user
  K8S_NAMESPACE: tech-challenge
  DEPLOYMENT_NAME: tech-challenge-deployment
  CONTAINER_NAME: app

jobs:
  # =================== 1) BUILD: build da imagem ===================
  build_image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Compute lowercase image
        id: meta
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO_LC}:${{ github.sha }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          docker build -t "${{ steps.meta.outputs.image }}" .

  # =================== 2) TESTS: testes da pipeline =================
  tests:
    runs-on: ubuntu-latest
    needs: build_image
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Mask secrets
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          [ -n "${SECRET_KEY}" ] && echo "::add-mask::${SECRET_KEY}"
          [ -n "${MYSQL_PASSWORD}" ] && echo "::add-mask::${MYSQL_PASSWORD}"
          [ -n "${MYSQL_ROOT_PASSWORD}" ] && echo "::add-mask::${MYSQL_ROOT_PASSWORD}"

      - name: Create .env.ci
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_HOST: ${{ env.MYSQL_HOST }}
          MYSQL_PORT: ${{ env.MYSQL_PORT }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
          MYSQL_USER: ${{ env.MYSQL_USER }}
          APP_PORT: ${{ env.APP_PORT }}
          APP_IMAGE: ${{ needs.build_image.outputs.image }}
        run: |
          cat > .env.ci <<EOF
          SECRET_KEY=${SECRET_KEY}
          MYSQL_PASSWORD=${MYSQL_PASSWORD}
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          MYSQL_HOST=${MYSQL_HOST}
          MYSQL_PORT=${MYSQL_PORT}
          MYSQL_DATABASE=${MYSQL_DATABASE}
          MYSQL_USER=${MYSQL_USER}
          APP_PORT=${APP_PORT}
          APP_IMAGE=${APP_IMAGE}
          DATABASE_URL=mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}
          MIGRATION_DATABASE_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}
          EOF

      - name: Point compose env_file to .env.ci
        run: echo "ENV_FILE=.env.ci" >> "$GITHUB_ENV"

      - name: Build & start stack (compose)
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          docker compose --env-file .env.ci up -d --build
          echo "Waiting for services..."
          sleep 15
          docker compose ps

      - name: Run migrations
        run: |
          docker compose --env-file .env.ci exec -T ${CONTAINER_NAME} alembic upgrade head

      - name: Run tests (pytest)
        run: |
          docker compose --env-file .env.ci run --rm ${CONTAINER_NAME} python -m pytest app/test/ -v --disable-warnings

      - name: Dump logs (on failure)
        if: failure()
        run: docker compose --env-file .env.ci logs --no-color || true

      - name: Stop and clean up
        if: always()
        run: docker compose --env-file .env.ci down -v

  # =================== 3) PUSH: push da imagem no GHCR ==============
  build_and_push:
    runs-on: ubuntu-latest
    needs: [build_image, tests]
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.USERNAME_GH || github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Compute lowercase image
        id: meta
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO_LC}:${{ github.sha }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      # Opcional: re-build para garantir que a tag exista neste runner
      - name: Push image
        run: |
          docker push "${{ steps.meta.outputs.image }}"

  # ============== 4) DEPLOY: deploy em Kubernetes (KIND) ============
  deploy_kubernetes:
    runs-on: ubuntu-latest
    needs: build_and_push
    env:
      APP_IMAGE: ${{ needs.build_and_push.outputs.image }}
      K8S_NAMESPACE: tech-challenge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4

      - name: Criar cluster KIND
        uses: helm/kind-action@v1
        with:
          cluster_name: tech-cluster

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.USERNAME_GH || github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Pull app image (GHCR -> local)
        run: docker pull "${APP_IMAGE}"

      - name: Carregar imagem no cluster KIND
        run: kind load docker-image "${APP_IMAGE}" --name tech-cluster

      - name: Instalar yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Atualizar apenas a imagem no deployment.yaml
        env:
          CONTAINER_NAME: tech-challenge
        run: |
          yq -i '(.spec.template.spec.containers[] | select(.name == env(CONTAINER_NAME))).image = env(APP_IMAGE)' kubernetes/deployment.yaml

      - name: Criar Secret no Kubernetes
        env:
          NS: tech-challenge
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_USER: ${{ vars.MYSQL_USER || 'tech_user' }}
          MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE || 'tech_challenge' }}
        run: |
          kubectl create namespace "$NS" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$NS" create secret generic tech-challenge-secret \
            --from-literal=SECRET_KEY="$SECRET_KEY" \
            --from-literal=MYSQL_PASSWORD="$MYSQL_PASSWORD" \
            --from-literal=DATABASE_URL="mysql+aiomysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}" \
            --from-literal=MIGRATION_DATABASE_URL="mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Criar namespace (manifesto opcional)
        run: |
          kubectl apply -f kubernetes/namespace.yaml || true

      - name: Criar Secrets e ConfigMap (manifests opcionais)
        run: |
          kubectl -n ${K8S_NAMESPACE} apply -f kubernetes/configmap.yaml || true
          kubectl -n ${K8S_NAMESPACE} apply -f kubernetes/externalsecret.yaml || true

      - name: Aplicar manifests
        run: |
          kubectl -n ${K8S_NAMESPACE} apply -f kubernetes/deployment.yaml
          kubectl -n ${K8S_NAMESPACE} apply -f kubernetes/hpa.yaml || true
          kubectl -n ${K8S_NAMESPACE} apply -f kubernetes/service.yaml

      - name: Aguardar rollout
        run: kubectl -n ${K8S_NAMESPACE} rollout status deployment/${DEPLOYMENT_NAME} --timeout=180s

      - name: Smoke test via Pod curl
        run: |
          kubectl -n ${K8S_NAMESPACE} run curl --image=curlimages/curl:8.10.1 --restart=Never --rm -i --command -- \
            curl -sS http://tech-challenge-service.${K8S_NAMESPACE}.svc.cluster.local:${{ env.APP_PORT }}/health || exit 1

      - name: Dump recursos (debug)
        if: failure()
        run: |
          kubectl -n ${K8S_NAMESPACE} get all
          kubectl -n ${K8S_NAMESPACE} logs deploy/${DEPLOYMENT_NAME} || true
