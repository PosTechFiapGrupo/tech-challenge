services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+aiomysql://tech_user:tech_password@mysql:3306/tech_challenge
      - MIGRATION_DATABASE_URL=mysql+pymysql://tech_user:tech_password@mysql:3306/tech_challenge
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=tech_challenge
      - MYSQL_USER=tech_user
      - MYSQL_PASSWORD=tech_password
      - MYSQL_ROOT_PASSWORD=root_password
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - tech-network

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=tech_challenge
      - MYSQL_USER=tech_user
      - MYSQL_PASSWORD=tech_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      timeout: 20s
      retries: 10
      start_period: 40s
      interval: 10s
    networks:
      - tech-network

volumes:
  mysql_data:

networks:
  tech-network:
    driver: bridge
