apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: tech-challenge
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1 # TODO: set your AWS region
      auth:
        # Assumes EKS + IRSA: pods use a ServiceAccount annotated with an IAM role that allows secrets access
        jwt:
          serviceAccountRef:
            name: tech-challenge-sa
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tech-challenge-sa
  namespace: tech-challenge
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/tech-challenge-external-secrets-role # TODO: replace with your IAM role ARN
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tech-challenge-secret-sync
  namespace: tech-challenge
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: tech-challenge-secret
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: tech-challenge/SECRET_KEY
    - secretKey: DATABASE_URL
      remoteRef:
        key: tech-challenge/DATABASE_URL
    - secretKey: MIGRATION_DATABASE_URL
      remoteRef:
        key: tech-challenge/MIGRATION_DATABASE_URL
    # Add other external service tokens as needed
    # - secretKey: EXTERNAL_API_TOKEN
    #   remoteRef:
    #     key: tech-challenge/EXTERNAL_API_TOKEN
