name: CI/CD – Tech Challenge com KIND (Build, Test, Deploy)

on:
  push:
    branches: [main]
  pull_request:
    branches: [fase1, fase2, fase3, fase4, fase5]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  APP_PORT: 8000
  MYSQL_HOST: mysql
  MYSQL_PORT: 3306
  MYSQL_DATABASE: tech_challenge
  MYSQL_USER: tech_user
  K8S_NAMESPACE: tech-challenge
  DEPLOYMENT_NAME: tech-challenge-deployment
  CONTAINER_NAME: app

jobs:
  # ============ 1. Build, Test & Publish Image ============
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.USERNAME_GH || github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Compute lowercase image
        id: meta
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO_LC}:${{ github.sha }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Build & Push image
        run: |
          docker build -t "${{ steps.meta.outputs.image }}" .
          docker push "${{ steps.meta.outputs.image }}"

  # ============ 2. Deploy & Test in KIND (Cluster local no runner) ============
  kind_deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    env:
      APP_IMAGE: ${{ needs.build_and_push.outputs.image }}
      K8S_NAMESPACE: tech-challenge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4

      - name: Criar cluster KIND
        uses: helm/kind-action@v1
        with:
          cluster_name: tech-cluster
      
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ vars.USERNAME_GH || github.actor }}
          password: ${{ secrets.GH_TOKEN }}
          
      - name: Pull app image (GHCR -> local)
        run: docker pull "${APP_IMAGE}"

      - name: Carregar imagem no cluster KIND
        run: kind load docker-image "${APP_IMAGE}" --name tech-cluster

      - name: Criar namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Criar Secrets e ConfigMap
        run: |
          kubectl -n ${K8S_NAMESPACE} apply -f k8s/configmap.yaml
          kubectl -n ${K8S_NAMESPACE} apply -f k8s/externalsecret.yaml || true

      - name: Injetar imagem no deployment.yaml
        run: |
          echo "Atualizando imagem para ${APP_IMAGE}"
          awk -v img="${APP_IMAGE}" -v cname="${CONTAINER_NAME}" '
            $0 ~ "name:[[:space:]]*"cname {
              print; getline; sub(/image:.*/, "image: " img); print; next
            }1' k8s/deployment.yaml > k8s/tmp && mv k8s/tmp k8s/deployment.yaml
          grep "image:" k8s/deployment.yaml

      - name: Aplicar manifests
        run: |
          kubectl -n ${K8S_NAMESPACE} apply -f k8s/deployment.yaml
          kubectl -n ${K8S_NAMESPACE} apply -f k8s/hpa.yaml

      - name: Aguardar rollout
        run: kubectl -n ${K8S_NAMESPACE} rollout status deployment/${DEPLOYMENT_NAME} --timeout=180s

      - name: Smoke test via Pod curl
        run: |
          kubectl -n ${K8S_NAMESPACE} run curl --image=curlimages/curl:8.10.1 -i --restart=Never --rm \
            -- curl -sS http://${DEPLOYMENT_NAME}.${K8S_NAMESPACE}.svc.cluster.local:${APP_PORT}/health || exit 1

      - name: Dump recursos (debug)
        if: failure()
        run: |
          kubectl -n ${K8S_NAMESPACE} get all
          kubectl -n ${K8S_NAMESPACE} logs deploy/${DEPLOYMENT_NAME} || true
